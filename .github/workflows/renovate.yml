name: Renovate

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: github
          # Repos Renovate manages. Add more entries as you onboard them.
          RENOVATE_REPOSITORIES: '["dejanvasic85/williamstownsc"]'
          # Standard GitHub runner has 16GB RAM, so give Node plenty of headroom.
          NODE_OPTIONS: "--max-old-space-size=6144"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
