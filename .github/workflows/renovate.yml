name: Renovate

on:
  schedule:
    # 06:00 Melbourne. GitHub cron is UTC only: 20:00 UTC = 06:00 AEST (UTC+10).
    # During daylight saving (AEDT, UTC+11) this fires at 07:00 — close enough.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.18
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORIES: '["dejanvasic85/renovate-config", "dejanvasic85/matchday","dejanvasic85/williamstownsc","dejanvasic85/ses-next","dejanvasic85/orderflow","dejanvasic85/notes","dejanvasic85/jlc-carpentry","dejanvasic85/portfolio","dejanvasic85/ynab-sync"]'
          # Every managed repo already has a committed renovate.json, so the onboarding
          # flow is never needed. Leaving it on made Renovate try to build an onboarding
          # PR for this repo and crash in ensureOnboardingPr ("reading 'homepage'"),
          # exiting the whole job non-zero.
          RENOVATE_ONBOARDING: "false"
          NODE_OPTIONS: "--max-old-space-size=6144"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
