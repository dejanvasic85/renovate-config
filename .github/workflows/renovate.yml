name: Renovate

on:
  schedule:
    # 06:00 Melbourne. GitHub cron is UTC only: 20:00 UTC = 06:00 AEST (UTC+10).
    # During daylight saving (AEDT, UTC+11) this fires at 07:00 — close enough.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
      repoCache:
        description: "Renovate repository cache"
        required: false
        default: "enabled"
        type: choice
        options:
          - enabled
          - disabled
          - reset

concurrency:
  group: renovate
  cancel-in-progress: false

env:
  renovate_data_dir: /tmp/renovate
  cache_dir: /tmp/renovate/cache/renovate/repository

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Restore Renovate repository cache
        if: github.event.inputs.repoCache != 'disabled'
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.cache_dir }}
          # Unique key each run + prefix restore-keys = always restore latest, always save fresh.
          key: renovate-cache-${{ github.run_id }}
          restore-keys: |
            renovate-cache-

      - name: Prepare Renovate directories
        run: |
          sudo mkdir -p "${cache_dir}" "${renovate_data_dir}/repos" "${renovate_data_dir}/cache/containerbase"
          sudo chown -R "$(id -u):$(id -g)" "${renovate_data_dir}"

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        with:
          docker-user: 1000
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: github
          RENOVATE_REPOSITORY_CACHE: ${{ github.event.inputs.repoCache || 'enabled' }}
          RENOVATE_REPOSITORIES: '["dejanvasic85/williamstownsc","dejanvasic85/ses-next","dejanvasic85/orderflow","dejanvasic85/notes","dejanvasic85/jlc-carpentry","dejanvasic85/portfolio","dejanvasic85/ynab-sync","dejanvasic85/team-manager"]'
          NODE_OPTIONS: "--max-old-space-size=6144"
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}

      - name: Save Renovate repository cache
        if: always() && github.event.inputs.repoCache != 'disabled'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.cache_dir }}
          key: renovate-cache-${{ github.run_id }}
